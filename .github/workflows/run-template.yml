name: Run Test Template

on:
  workflow_call:
    inputs:
      suite:
        required: true
        type: string

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - run: mvn test -Dsurefire.suiteXmlFiles=${{ inputs.suite }}